<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>VocaClear Data Builder</title>
    <style>
        :root { --primary: #3ecf8e; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; color: #1e293b; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 800px; margin: auto; }
        h2 { margin-top: 0; color: var(--primary); }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .row-input { display: flex; gap: 10px; margin-bottom: 10px; }
        button { cursor: pointer; padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        .add-btn { background: #e2e8f0; color: #1e293b; width: 100%; }
        .generate-btn { background: var(--primary); color: white; margin-top: 20px; width: 100%; }
        .output-area { margin-top: 20px; background: #1e293b; color: #3ecf8e; padding: 15px; border-radius: 8px; font-family: monospace; white-space: pre-wrap; font-size: 0.9rem; position: relative; }
        .copy-btn { position: absolute; right: 10px; top: 10px; font-size: 0.7rem; background: #64748b; color: white; }
    </style>
</head>
<body>

<div class="card">
    <h2>VocaClear Data Builder</h2>
    
    <label>1. テーブル名（英数）</label>
    <input type="text" id="targetTable" placeholder="例: toeic_words_part1">

    <label>2. 単語リスト</label>
    <div id="inputContainer">
        <div class="row-input">
            <input type="text" placeholder="英語 (english)" class="en">
            <input type="text" placeholder="日本語 (japanese)" class="jp">
        </div>
    </div>
    <button class="add-btn" onclick="addRow()">+ 行を追加</button>

    <button class="generate-btn" onclick="generate()">SQLとCSVを生成する</button>

    <div id="result" style="display:none;">
        <h3>Supabase SQL (SQL Editorに貼り付け用)</h3>
        <div class="output-area">
            <button class="copy-btn" onclick="copyText('sqlOutput')">コピー</button>
            <code id="sqlOutput"></code>
        </div>

        <h3>CSVデータ (CSVファイル作成用)</h3>
        <div class="output-area">
            <button class="copy-btn" onclick="copyText('csvOutput')">コピー</button>
            <code id="csvOutput"></code>
        </div>
    </div>
</div>

<script>
    function addRow() {
        const div = document.createElement('div');
        div.className = 'row-input';
        div.innerHTML = `<input type="text" placeholder="英語" class="en"><input type="text" placeholder="日本語" class="jp">`;
        document.getElementById('inputContainer').appendChild(div);
    }

    function generate() {
        const tableName = document.getElementById('targetTable').value.trim() || 'my_words';
        const enInputs = document.querySelectorAll('.en');
        const jpInputs = document.querySelectorAll('.jp');
        
        let sqlRows = [];
        let csvRows = ["english,japanese"];
        
        enInputs.forEach((el, i) => {
            const en = el.value.trim();
            const jp = jpInputs[i].value.trim();
            if(en && jp) {
                sqlRows.push(`('${en}', '${jp}')`);
                csvRows.push(`${en},${jp}`);
            }
        });

        if (sqlRows.length === 0) return alert("データがありません");

        // SQL生成
        const sql = `-- テーブル作成\nCREATE TABLE IF NOT EXISTS ${tableName} (\n  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,\n  english TEXT NOT NULL,\n  japanese TEXT NOT NULL\n);\n\n-- データ挿入\nINSERT INTO ${tableName} (english, japanese) VALUES\n${sqlRows.join(',\n')};`;
        
        document.getElementById('sqlOutput').innerText = sql;
        document.getElementById('csvOutput').innerText = csvRows.join('\n');
        document.getElementById('result').style.display = 'block';
    }

    function copyText(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text);
        alert("コピーしました！");
    }
</script>

</body>
</html>
